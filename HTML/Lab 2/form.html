<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<h1>Registration form</h1>

<body>
    <form action="#" method="post">
        <fieldset>
            <legend>Personal Information</legend>
            <label for="fname">First Name: </label>
            <input type="text" name="fname" id="fname" required>
            <br><br>

            <label for="lname">Last Name: </label>
            <input type="text" name="lname" id="lname" required>
            <br><br>

            <label for="email">Email: </label>
            <input type="email" name="email" id="email" required>
            <br><br>

            <label for="phone">Phone </label>
            <input type="tel" name="phone" id="phone" required>
            <br><br>

            <label for="dob">Date of Birth: </label>
            <input type="date" name="dob" id="dob" required>
            <br><br>

            Gender:
            <input type="radio" name="gender" id="male" value="Male">
            <label for="male">Male</label>
            <input type="radio" name="gender" id="female" value="Female">
            <label for="female">Female</label>
            <input type="radio" name="gender" id="others" value="Others">
            <label for="others">Others</label>
        </fieldset>

        <fieldset>
            <legend>Academic Information</legend>
            <label for="StudentId">Student Id : </label>
            <input type="text" name="StudentId" id="StudentId" required>
            <br><br>

            <lable for="department">Department</lable>
            <select name="department" id="department">
                <option value="">Select department</option>
                <option value="CSE">CSE</option>
                <option value="EEE">EEE</option>
                <option value="BBA">BBA</option>
            </select>
            <br><br>

            <label for="semester">Semester</label>
            <select name="semester" id="semester">
                <option value="">Select Semester</option>
                <option value="1st">1st</option>
                <option value="2nd">2nd</option>
                <option value="3rd">3rd</option>
                <option value="4th">4th</option>

            </select>




        </fieldset>

        <fieldset>
            <legend>Skills</legend>
            Skills:
            <br>
            <input type="checkbox" name="skills" id="html" value="HTML">
            <label for="html">HTML</label><br>
            <input type="checkbox" name="skills" id="css" value="CSS">
            <label for="css">CSS</label><br>
            <input type="checkbox" name="skills" id="js" value="JS">
            <label for="js">JS</label><br>

        </fieldset>
        <fieldset>
            <legend>Additional Information</legend>
            <label for="address">Address: </label>
            <textarea id="address" name="address" rows="4" cols="40"></textarea>
            <br><br>

            <label for="photo">Upload Student Photo:</label>
            <br>
            <input type="file" name="photo" id="photo" accept="image/*">
            <br><br>

            <label for="comments">Comments/Suggestions:</label>
            <textarea id="comments" name="comments" rows="4" cols="40"></textarea>
            <br><br>

            <input type="submit" value="Submit">
            <input type="reset" value="Reset">
        </fieldset>






    </form>

</body>

</html>
