<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creating a Library Membership Registration Form Using HTML</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <form action="#" method="post">
        <fieldset>
            <legend>Personal Information</legend>
            <label for="name">Full Name: </label>
            <input type="text" name="name" id="name" required>
            <br>

            <label for="membershipid">Membership ID: </label>
            <input type="text" name="membershipid" id="membershipid" required>
            <br>

            <label for="email">Email Address: </label>
            <input type="email" name="email" id="email" required>
            <br>

            <label for="phone">Phone Number:</label>
            <input type="tel" name="phone" id="phone" required>
            <br>

            <label for="dob">Date of Birth: </label>
            <input type="date" name="dob" id="dob" required>
            <br>

            Gender:
            <input type="radio" name="gender" id="male" value="Male">
            <label for="male">Male</label>
            <input type="radio" name="gender" id="female" value="Female">
            <label for="female">Female</label>
            <input type="radio" name="gender" id="others" value="Others">
            <label for="others">Others</label>
            <br><br>
        </fieldset>

        <fieldset>
            <legend>Membership Information</legend>
            <label for="membershiptype">Membership Type:</label>
            <select name="membershiptype" id="membershiptype">
                <option value="">Select membership type</option>
                <option value="Student">Student</option>
                <option value="Faculty">Faculty</option>
                <option value="Researcher">Researcher</option>
                <option value="General Member">General Member</option>
            </select>
            <br>
        </fieldset>

        <fieldset>
            <legend>Library Preferences</legend>
            <label for="preferredlibrarySection">Select library preferences:</label>
            <select name="preferredlibrarySection" id="preferredlibrarySection">
                <option value="">Select preferred library section</option>
                <option value="Science & Technology">Science & Technology</option>
                <option value="Literature">Literature</option>
                <option value="Business Studies">Business Studies</option>
                <option value="History">History</option>
                <option value="Arts & Culture">Arts & Culture</option>
            </select>
            <br>
        </fieldset>

        <fieldset>
            <legend>Reading Preferences</legend>
            <label for="preferredlibrarySection">Select Favourite Book Categories:</label>
            <br>
            <input type="checkbox" name="readingPreferences" id="fiction" value="fiction">
            <label for="fiction">Fiction</label><br>
            <input type="checkbox" name="readingPreferences" id="nonfiction" value="nonfiction">
            <label for="nonfiction">Non-Fiction</label><br>
            <input type="checkbox" name="readingPreferences" id="science" value="science">
            <label for="science">Science</label><br>
            <input type="checkbox" name="readingPreferences" id="technology" value="technology">
            <label for="technology">Technology</label><br>
            <input type="checkbox" name="readingPreferences" id="biography" value="biography">
            <label for="biography">Biography</label><br>
            <input type="checkbox" name="readingPreferences" id="history" value="history">
            <label for="history">History</label><br>
            <br>
        </fieldset>

        <fieldset>
            <legend>Library Services</legend>
            <label for="libraryServices">Select Library Services You Want To Use:</label>
            <br>
            <input type="checkbox" name="libraryServices" id="bookborrowing" value="bookborrowing">
            <label for="bookborrowing">Book Borrowing</label><br>
            <input type="checkbox" name="libraryServices" id="diglibraryaccess" value="diglibraryaccess">
            <label for="diglibraryaccess">Digital Library Access</label><br>
            <input type="checkbox" name="libraryServices" id="readingroom" value="readingroom">
            <label for="readingroom">Reading Room Access</label><br>
            <input type="checkbox" name="libraryServices" id="researchassistance" value="researchassistance">
            <label for="researchassistance">Research Assistance</label><br>
            <br>
        </fieldset>

        <fieldset>
            <legend>Additional Information</legend>
            Current Address:
            <br />
            <textarea id="addrress" name="addrress" row="4" cols="40"></textarea>
            <br />
            <label for="phone">Emergency Contact Number:</label>
            <input type="text" name="phone" id="phone" required>
            <br />
            Reason for Joining Library:
            <br />
            <textarea id="reason" name="reason" row="4" cols="40"></textarea>
            <br />
            Suggestion For Library Improvement:
            <br />
            <textarea id="suggestion" name="suggestion" row="4" cols="40"></textarea>
            <br />


        </fieldset>

        <br />
        <input type="submit" value="submit">
        <input type="reset" value="reset">
    </form>

</body>

</html>
